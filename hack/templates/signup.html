<!DOCTYPE html>
<html>
<head>
<title>Signup - CrowdPulse AI</title>
<style>
  body {
    font-family: 'Inter', sans-serif;
    background: #0a0a0a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  .login-box {
    background: #1a1a1a;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0, 255, 204, 0.1);
    text-align: center;
    width: 100%;
    max-width: 400px;
  }
  h1 { color: #00ffcc; margin-bottom: 24px; }
  .flash-message {
    background: rgba(255, 0, 0, 0.1);    
    color: #ff4d4d;
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 20px;
  }
  input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    background: #2a2a2a;
    border: 1px solid #333;
    border-radius: 6px;
    color: white;
    box-sizing: border-box;
  }
  input:focus {
    outline: none;
    border-color: #00ffcc;
  }
  button {
    width: 100%;
    padding: 14px;
    background: #00ffcc;
    color: #000;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 15px;
    transition: all 0.3s ease;
  }
  button:hover {
    background: #00ccaa;
    transform: translateY(-2px);
  }
  a {
    color: #00ffcc;
    text-decoration: none;
    display: block;
    margin-top: 20px;
    font-size: 14px;
  }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="login-box">
  <h1>🚨 Join CrowdPulse</h1>
  
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for msg in messages %}
        <div class="flash-message">{{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form method="POST" action="/signup">
    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>
    <input type="text" name="phone" placeholder="Mobile Number (e.g. +1...)" required>
    <button type="submit">CREATE ACCOUNT</button>
  </form>

  <a href="/login">Already have an account? Login</a>
</div>

</body>
</html>
